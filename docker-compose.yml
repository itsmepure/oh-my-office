# Multi-Office AI Platform — Development PostgreSQL

services:
  postgres:
    image: postgres:17-alpine
    container_name: openoffice-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: openoffice
      POSTGRES_PASSWORD: openoffice
      POSTGRES_DB: openoffice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openoffice"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
